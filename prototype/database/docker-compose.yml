services:
  postgres:
    image: postgres:16
    container_name: fridge-planner-db
    restart: unless-stopped
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fridge_planner}
      POSTGRES_USER: ${POSTGRES_USER:-fridge_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fridge_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
